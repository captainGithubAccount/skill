import groovy.json.JsonSlurper

/**
 * 解析 .mdc 文件顶部 YAML frontmatter（两个 --- 之间的内容）。
 */
ext.parseMdcFrontmatter = { File mdcFile ->
    def text = mdcFile.getText('UTF-8')
    if (!text.startsWith('---')) {
        return null
    }
    def endIndex = text.indexOf('---', 3)
    if (endIndex < 0) {
        return null
    }
    return text.substring(3, endIndex).trim()
}

/** 构建日志导出目录（相对工程根目录：.cursor/buildTxt） */
ext.BUILD_TXT_DIR_RELATIVE = '.cursor/buildTxt'

/** 权限审计报告固定文件名（不含扩展名，每次构建覆盖同一文件） */
ext.PERMISSION_AUDIT_BUILD_TXT_NAME = 'task-permission-audit'

/**
 * 获取 buildTxt 目录（工程根目录/.cursor/buildTxt）。
 */
ext.getBuildTxtDir = {
    def dir = new File(rootProject.projectDir, BUILD_TXT_DIR_RELATIVE)
    dir.mkdirs()
    return dir
}

/**
 * 是否将 buildTxt 内容同时 echo 到控制台（默认 false，仅写文件）。
 * 调试时可加：./gradlew cursorCodeReviewCheck -PbuildTxt.echoToConsole=true
 */
ext.isBuildTxtEchoToConsole = {
    def prop = rootProject.findProperty('buildTxt.echoToConsole')
    return 'true'.equalsIgnoreCase(String.valueOf(prop))
}

/**
 * 将闭包内 println 输出写入 buildTxt/{fileBaseName}.txt（默认不打印控制台）。
 *
 * @param fileBaseName 不含扩展名的文件名，如 task-permission-audit
 * @param phase 写入来源（任务名），写入文件头
 * @param block 要执行的打印逻辑
 */
ext.captureBuildTxtOutput = { String fileBaseName, String phase, Closure block ->
    def buildTxtDir = getBuildTxtDir()
    def outFile = new File(buildTxtDir, "${fileBaseName}.txt")
    def buffer = new ByteArrayOutputStream()
    def originalOut = System.out
    def echo = isBuildTxtEchoToConsole()

    def captureOut
    if (echo) {
        captureOut = new PrintStream(new OutputStream() {
            void write(int b) {
                originalOut.write(b)
                buffer.write(b)
            }

            void write(byte[] bytes, int off, int len) {
                originalOut.write(bytes, off, len)
                buffer.write(bytes, off, len)
            }
        }, true, 'UTF-8')
    } else {
        captureOut = new PrintStream(buffer, true, 'UTF-8')
    }

    try {
        System.setOut(captureOut)
        block.call()
    } finally {
        System.setOut(originalOut)
        captureOut.flush()
    }

    def timestamp = new java.text.SimpleDateFormat('yyyy-MM-dd HH:mm:ss').format(new Date())
    def header = new StringBuilder()
    header.append('# 自动生成，请勿手工编辑').append('\n')
    header.append("# phase: ${phase}").append('\n')
    header.append("# time: ${timestamp}").append('\n')
    header.append('# path: ').append(outFile.name).append('\n\n')
    outFile.setText(header.toString() + buffer.toString('UTF-8'), 'UTF-8')

    if (echo) {
        def relative = outFile.absolutePath
            .replace(rootProject.projectDir.absolutePath + File.separator, '')
        println "📝 已写入 ${relative}"
    }
}

/**
 * 从 frontmatter 文本中提取 gradleChecks JSON 数组字符串。
 */
ext.extractGradleChecksJson = { String frontmatter ->
    if (frontmatter == null || frontmatter.isEmpty()) {
        return null
    }
    def matcher = (frontmatter =~ /(?m)^gradleChecks:\s*(.+)$/)
    if (!matcher.find()) {
        return null
    }
    def raw = matcher.group(1).trim()
    if ((raw.startsWith("'") && raw.endsWith("'")) || (raw.startsWith('"') && raw.endsWith('"'))) {
        raw = raw.substring(1, raw.length() - 1)
    }
    return raw.trim()
}

/**
 * 静默执行闭包（默认不输出控制台；调试时 -PbuildTxt.echoToConsole=true）。
 */
ext.runSilentlyUnlessEcho = { Closure block ->
    if (isBuildTxtEchoToConsole()) {
        block.call()
        return
    }
    def buffer = new ByteArrayOutputStream()
    def silentOut = new PrintStream(buffer, true, 'UTF-8')
    def originalOut = System.out
    try {
        System.setOut(silentOut)
        block.call()
    } finally {
        System.setOut(originalOut)
        silentOut.flush()
    }
}

/**
 * 清理 buildTxt 下除权限审计外的其它 txt，避免历史残留多文件。
 */
ext.cleanupBuildTxtExceptPermissionAudit = {
    def dir = getBuildTxtDir()
    def keepName = "${PERMISSION_AUDIT_BUILD_TXT_NAME}.txt"
    dir.listFiles()?.each { File file ->
        if (file.isFile() && file.name.endsWith('.txt') && file.name != keepName) {
            file.delete()
        }
    }
}

/**
 * 判断 .mdc 文件名是否属于 cursorCodeReviewCheck 扫描范围（文件名包含 task-）。
 */
ext.isCursorTaskRuleFile = { String fileName ->
    return fileName.toLowerCase().contains('task-') && fileName.toLowerCase().endsWith('.mdc')
}

/**
 * 收集待执行的 Cursor task 规则文件。
 *
 * @param onlyTaskPrefix true 仅 task- 规则；false 全部 .mdc
 */
ext.collectCursorRuleFiles = { boolean onlyTaskPrefix ->
    def rulesDir = new File(rootProject.projectDir, '.cursor/rules')
    if (!rulesDir.exists() || !rulesDir.isDirectory()) {
        println '⚠️ [.cursor/rules] 目录不存在，跳过 Cursor 规则检查'
        return []
    }
    return rulesDir.listFiles({ File dir, String name ->
        name.toLowerCase().endsWith('.mdc') && (!onlyTaskPrefix || isCursorTaskRuleFile(name))
    } as FilenameFilter)?.toList()?.sort() ?: []
}

/**
 * 读取 properties 文件为 key-value（忽略 # 注释行，trim 后）。
 */
ext.loadPropertiesLines = { File propsFile ->
    if (!propsFile.exists()) {
        return [:]
    }
    def result = [:]
    propsFile.eachLine('UTF-8') { line ->
        def trimmed = line.trim()
        if (trimmed.isEmpty() || trimmed.startsWith('#')) {
            return
        }
        def eqIndex = trimmed.indexOf('=')
        if (eqIndex <= 0) {
            return
        }
        def key = trimmed.substring(0, eqIndex).trim()
        def value = trimmed.substring(eqIndex + 1).trim()
        result[key] = value
    }
    return result
}

/**
 * 执行 propertiesScan：扫描 properties 文件中是否命中指定 value。
 */
ext.runPropertiesScanCheck = { Map check, String ruleFileName ->
    def targetFile = check.file ?: 'local.properties'
    def propsFile = new File(rootProject.projectDir, targetFile)
    if (!propsFile.exists()) {
        println "⚠️ [${ruleFileName}] 未找到配置文件：${targetFile}"
        return 1
    }

    def props = loadPropertiesLines(propsFile)
    def matchValues = (check.matchValues ?: [])*.toString()
    def matchKeys = (check.matchKeys ?: [])*.toString()
    def hits = []

    props.each { key, value ->
        def keyMatched = matchKeys.isEmpty() || matchKeys.contains(key)
        def valueMatched = matchValues.contains(value)
        if (keyMatched && valueMatched) {
            hits << "${key}=${value}"
        }
    }

    if (hits.isEmpty()) {
        if (check.success) {
            println check.success
        }
        return 0
    }

    def warn = (check.warn ?: '⚠️ propertiesScan 命中禁止值').toString()
    println warn.replace('{hits}', hits.join(', '))
    hits.each { hit -> println "  - ${hit}" }
    return hits.size()
}

/**
 * 执行 sourceScan：在源码目录中搜索禁止 pattern。
 */
ext.runSourceScanCheck = { Map check, String ruleFileName ->
    def scanRoot = check.root ?: 'app'
    def includes = check.includes ?: ['**/*.kt', '**/*.java']
    def pattern = check.pattern?.toString()
    if (pattern == null || pattern.isEmpty()) {
        println "⚠️ [${ruleFileName}] sourceScan 缺少 pattern，已跳过"
        return 0
    }

    def rootFile = new File(rootProject.projectDir, scanRoot)
    if (!rootFile.exists()) {
        println "⚠️ [${ruleFileName}] 扫描目录不存在：${scanRoot}"
        return 0
    }

    def regex = ~pattern
    def matchedFiles = []
    fileTree(rootFile) {
        includes.each { include it }
        if (check.excludes) {
            check.excludes.each { exclude it }
        }
    }.each { File sourceFile ->
        if (sourceFile.text =~ regex) {
            matchedFiles << sourceFile.absolutePath
                .replace(rootProject.projectDir.absolutePath + File.separator, '')
        }
    }

    if (matchedFiles.isEmpty()) {
        if (check.success) {
            println check.success
        }
        return 0
    }

    def warn = (check.warn ?: '⚠️ sourceScan 发现违规代码').toString()
    println warn.replace('{files}', matchedFiles.join(', '))
    matchedFiles.each { path -> println "  - ${path}" }
    return matchedFiles.size()
}

/**
 * 执行 fileExists：检查必要文件是否存在。
 */
ext.runFileExistsCheck = { Map check, String ruleFileName ->
    def targetFile = check.file
    if (targetFile == null || targetFile.toString().isEmpty()) {
        println "⚠️ [${ruleFileName}] fileExists 缺少 file，已跳过"
        return 0
    }
    def file = new File(rootProject.projectDir, targetFile.toString())
    if (file.exists()) {
        if (check.success) {
            println check.success
        }
        return 0
    }
    def warn = (check.warn ?: "⚠️ 缺少必要文件：${targetFile}").toString()
    println warn.replace('{file}', targetFile.toString())
    return 1
}

/**
 * 从 AndroidManifest 解析 LAUNCHER Activity 类名。
 */
ext.findLauncherActivityFromManifest = { File manifestFile ->
    if (!manifestFile.exists()) {
        return null
    }
    def text = manifestFile.getText('UTF-8')
    def blocks = text.split('<activity')
    for (block in blocks) {
        if (block.contains('LAUNCHER') && block.contains('MAIN')) {
            def matcher = (block =~ /android:name="([^"]+)"/)
            if (matcher.find()) {
                return matcher.group(1)
            }
        }
    }
    return null
}

