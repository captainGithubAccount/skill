/**
 * 从合并/主 Manifest 提取 uses-permission 名称列表。
 */
ext.parseManifestPermissionNames = { String manifestText ->
    def names = [] as LinkedHashSet
    def matcher = (manifestText =~ /<uses-permission[^>]*android:name="([^"]+)"/)
    matcher.each { names.add(it[1]) }
    return names.toList()
}

/**
 * 解析主 Manifest 中 tools:node="remove" 的权限与组件。
 */
ext.parseManifestRemoveNodes = { File mainManifest ->
    def removedPermissions = [] as LinkedHashSet
    def removedComponents = [] as LinkedHashSet
    if (!mainManifest.exists()) {
        return [permissions: removedPermissions.toList(), components: removedComponents.toList()]
    }
    def text = mainManifest.getText('UTF-8')
    def permMatcher = (text =~ /(?s)<uses-permission[^>]*android:name="([^"]+)"[^>]*tools:node="remove"/)
    permMatcher.each { removedPermissions.add(it[1]) }
    def svcMatcher = (text =~ /(?s)<service[^>]*android:name="([^"]+)"[^>]*tools:node="remove"/)
    svcMatcher.each { removedComponents.add("service:${it[1]}") }
    return [permissions: removedPermissions.toList(), components: removedComponents.toList()]
}

/**
 * 从 manifest-merger 报告解析权限来源库。
 */
ext.parseMergerPermissionSources = { File reportFile ->
    def sources = [:].withDefault { [] as LinkedHashSet }
    if (!reportFile.exists()) {
        return sources
    }
    def currentPerm = null
    reportFile.eachLine('UTF-8') { line ->
        def permMatch = (line =~ /^uses-permission#(.+)$/)
        if (permMatch.find()) {
            currentPerm = permMatch.group(1)
            return
        }
        if (currentPerm != null && line.contains('ADDED from [')) {
            def libMatch = (line =~ /ADDED from \[([^\]]+)\]/)
            if (libMatch.find()) {
                sources[currentPerm].add(libMatch.group(1))
            }
        }
    }
    return sources.collectEntries { k, v -> [(k): v.toList()] }
}

/**
 * 扫描源码中显式引用到的权限名。
 */
ext.scanSourceReferencedPermissions = { List<String> scanRoots ->
    def referenced = [] as LinkedHashSet
    scanRoots.each { relRoot ->
        def root = new File(rootProject.projectDir, relRoot)
        if (!root.exists()) {
            return
        }
        fileTree(root) {
            include '**/*.kt', '**/*.java', '**/*.xml'
            exclude '**/build/**'
        }.each { File f ->
            def text = f.getText('UTF-8')
            def direct = (text =~ /android\.permission\.([A-Z0-9_]+)/)
            direct.each { referenced.add("android.permission.${it[1]}") }
            def manifestPerm = (text =~ /android:name="(android\.permission\.[^"]+)"/)
            manifestPerm.each { referenced.add(it[1]) }
            PERMISSION_AUDIT_XX_MAP.each { shortName, fullName ->
                if (text.contains("Permission.${shortName}") || text.contains("Manifest.permission.${shortName}")) {
                    referenced.add(fullName)
                }
            }
            if (text.contains('openGallery') || text.contains('PictureSelector') || text.contains('SelectMimeType.ofImage')) {
                referenced.add('android.permission.READ_MEDIA_IMAGES')
                referenced.add('android.permission.READ_EXTERNAL_STORAGE')
            }
            if (text.contains('openCamera') || text.contains('SelectMimeType.ofVideo') || text.contains('SelectMimeType.ofAll')) {
                referenced.add('android.permission.CAMERA')
                referenced.add('android.permission.READ_MEDIA_VIDEO')
            }
            if (text.contains('WorkManager') || text.contains('PeriodicWork') || text.contains('OneTimeWorkRequest')) {
                referenced.add('android.permission.RECEIVE_BOOT_COMPLETED')
                referenced.add('android.permission.FOREGROUND_SERVICE')
            }
        }
    }
    return referenced.toList()
}

/**
 * 根据 build.gradle 依赖与源码特征推断 SDK 所需权限。
 */
ext.inferSdkPermissions = { String gradleText, List<String> sourceReferenced ->
    def inferred = [] as LinkedHashSet
    inferred.add('android.permission.INTERNET')
    inferred.add('android.permission.ACCESS_NETWORK_STATE')

    if (gradleText.contains('firebase') || gradleText.contains('play-services-measurement')) {
        inferred.add('android.permission.WAKE_LOCK')
        inferred.add('com.google.android.gms.permission.AD_ID')
        inferred.add('android.permission.ACCESS_ADSERVICES_ATTRIBUTION')
        inferred.add('android.permission.ACCESS_ADSERVICES_AD_ID')
        inferred.add('com.google.android.finsky.permission.BIND_GET_INSTALL_REFERRER_SERVICE')
    }
    if (gradleText.contains('install.referrer') || gradleText.contains('installreferrer')) {
        inferred.add('com.google.android.finsky.permission.BIND_GET_INSTALL_REFERRER_SERVICE')
    }
    if (gradleText.contains('pictureselector') || gradleText.contains('PictureSelector')) {
        if (sourceReferenced.contains('android.permission.READ_MEDIA_IMAGES') ||
            sourceReferenced.contains('android.permission.READ_EXTERNAL_STORAGE')) {
            inferred.add('android.permission.READ_MEDIA_IMAGES')
        }
    }
    if (gradleText.contains('androidx.work') || gradleText.contains('work-runtime')) {
        inferred.add('android.permission.RECEIVE_BOOT_COMPLETED')
        inferred.add('android.permission.FOREGROUND_SERVICE')
    }
    return inferred.toList()
}

/**
 * 判断是否为应用签名/内部权限（不可 tools:node remove）。
 */
ext.isInternalOrSignaturePermission = { String permName, String applicationId ->
    if (permName.contains('DYNAMIC_RECEIVER_NOT_EXPORTED_PERMISSION')) {
        return true
    }
    if (permName.startsWith("${applicationId}.")) {
        return true
    }
    return false
}

/**
 * 生成 Manifest remove 配置片段。
 */
ext.buildPermissionRemoveSnippet = { List<String> permissionNames ->
    if (permissionNames.isEmpty()) {
        return '    （无需新增 remove 配置）'
    }
    def sb = new StringBuilder()
    permissionNames.each { perm ->
        sb.append('    <uses-permission\n')
        sb.append("        android:name=\"${perm}\"\n")
        sb.append('        tools:node="remove" />\n')
    }
    return sb.toString().trim()
}

/**
 * 执行敏感权限审计（task-permission-audit，仅信息输出，不计入警告）。
 */
ext.runPermissionAuditCheck = { Map check, String ruleFileName ->
    def mergedManifest = new File(
        rootProject.projectDir,
        'app/build/intermediates/merged_manifest/debug/processDebugMainManifest/AndroidManifest.xml'
    )
    def mainManifest = new File(rootProject.projectDir, 'app/src/main/AndroidManifest.xml')
    def mergerReport = new File(rootProject.projectDir, 'app/build/outputs/logs/manifest-merger-debug-report.txt')
    def appGradle = new File(rootProject.projectDir, 'app/build.gradle.kts')

    println ''
    println '========== [task-permission-audit] 敏感权限审计 =========='
    println ''

    if (!mergedManifest.exists()) {
        println '⚠️ 未找到合并 Manifest，请先执行：'
        println '   ./gradlew :app:processDebugMainManifest'
        println '   或 ./gradlew cursorCodeReviewCheck（已自动依赖 manifest 合并）'
        println ''
        return 0
    }

    def mergedPerms = parseManifestPermissionNames(mergedManifest.getText('UTF-8'))
    def removes = parseManifestRemoveNodes(mainManifest)
    def mergerSources = parseMergerPermissionSources(mergerReport)
    def scanRoots = (check.scanRoots ?: ['app/src/main', 'netLib/src/main']) as List
    def sourceReferenced = scanSourceReferencedPermissions(scanRoots)
    def gradleText = appGradle.exists() ? appGradle.getText('UTF-8') : ''
    def sdkInferred = inferSdkPermissions(gradleText, sourceReferenced)

    def applicationId = 'com.project.pdf'
    def appIdMatcher = (mainManifest.exists() ? mainManifest.getText('UTF-8') : '') =~ /applicationId\s*=?\s*"([^"]+)"/
    // 从 build.gradle.kts 读取 applicationId
    def buildAppId = (gradleText =~ /applicationId\s*=\s*"([^"]+)"/)
    if (buildAppId.find()) {
        applicationId = buildAppId.group(1)
    }

    // ── 1. 敏感权限 ──
    println '【一】当前合并清单中的敏感权限'
    def sensitiveFound = []
    PERMISSION_AUDIT_SENSITIVE_GROUPS.each { groupName, permList ->
        def hits = mergedPerms.findAll { permList.contains(it) }
        if (!hits.isEmpty()) {
            sensitiveFound.addAll(hits)
            println "  [${groupName}]"
            hits.each { perm ->
                def libs = mergerSources[perm]?.join(', ') ?: '（未知来源，可能为主工程声明）'
                println "    - ${perm}"
                println "      来源: ${libs}"
            }
        }
    }
    if (sensitiveFound.isEmpty()) {
        println '  （无预定义敏感权限命中）'
    }
    println ''

    // ── 2. 全部合并权限 ──
    println '【二】合并 Manifest 全部 uses-permission（含三方库）'
    mergedPerms.each { perm ->
        def libs = mergerSources[perm]?.join(', ') ?: '主工程 / 未知'
        println "  - ${perm}"
        println "    来源: ${libs}"
    }
    println ''

    // ── 3. 已配置 remove ──
    println '【三】主 Manifest 已配置 tools:node="remove"'
    if (removes.permissions.isEmpty() && removes.components.isEmpty()) {
        println '  （无）'
    } else {
        removes.permissions.each { println "  - 权限: ${it}" }
        removes.components.each { println "  - 组件: ${it}" }
    }
    println ''

    // ── 4. 建议保留 ──
    println '【四】建议保留（源码 / SDK / 系统内部）'
    def keepReasons = [:].withDefault { [] as LinkedHashSet }
    mergedPerms.each { perm ->
        if (isInternalOrSignaturePermission(perm, applicationId)) {
            keepReasons[perm].add('应用签名/内部权限，不可 remove')
        }
        if (sourceReferenced.contains(perm)) {
            keepReasons[perm].add('源码显式引用')
        }
        if (sdkInferred.contains(perm)) {
            keepReasons[perm].add('依赖 SDK 推断需要')
        }
        if (perm == 'android.permission.INTERNET') {
            keepReasons[perm].add('网络功能必需')
        }
    }
    if (keepReasons.isEmpty()) {
        println '  （无）'
    } else {
        keepReasons.keySet().sort().each { perm ->
            println "  - ${perm}"
            keepReasons[perm].each { reason -> println "      原因: ${reason}" }
        }
    }
    println ''

    // ── 5. 可安全 remove ──
    println '【五】可安全 remove（合并清单仍存在，且不影响当前 App 功能）'
    def removable = mergedPerms.findAll { perm ->
        if (isInternalOrSignaturePermission(perm, applicationId)) {
            return false
        }
        if (removes.permissions.contains(perm)) {
            return false
        }
        if (sourceReferenced.contains(perm)) {
            return false
        }
        if (sdkInferred.contains(perm)) {
            return false
        }
        if (perm == 'android.permission.INTERNET' || perm == 'android.permission.ACCESS_NETWORK_STATE') {
            return false
        }
        return true
    }.sort()

    if (removable.isEmpty()) {
        println '  ✅ 未发现可额外 remove 的权限（或均已配置 remove）'
    } else {
        removable.each { perm ->
            def libs = mergerSources[perm]?.join(', ') ?: '未知'
            println "  - ${perm}"
            println "      来源: ${libs}"
            println '      判定: 源码未引用且当前 SDK 推断不需要'
        }
    }
    println ''

    // ── 6. 复制到 Manifest 的配置 ──
    println '【六】复制到 app/src/main/AndroidManifest.xml（<manifest> 内，application 之前）'
    println ''
    println buildPermissionRemoveSnippet(removable)
    println ''

    // ── 7. 仍出现在合并清单但已配置 remove 的异常 ──
    def removeLeak = removes.permissions.findAll { mergedPerms.contains(it) }
    if (!removeLeak.isEmpty()) {
        println '【七】⚠️ 已配置 remove 但合并清单仍存在（请 Clean 后重新合并 Manifest）'
        removeLeak.each { println "  - ${it}" }
        println ''
    }

    println '说明:'
    println '  - 审计基于 debug 合并 Manifest + 源码静态扫描，运行时动态申请需人工复核'
    println '  - 「可安全 remove」不含签名/内部权限；移除后请回归：选图、网络、埋点、AB 归因'
    println '  - 报告路径: app/build/outputs/logs/manifest-merger-debug-report.txt'
    println ''
    println '===================================================='
    println ''
    return 0
}

/**
 * 执行单条 gradleCheck 配置。
 */
ext.runSingleGradleCheck = { Map check, String ruleFileName ->
    def type = check.type?.toString()
    switch (type) {
        case 'propertiesScan':
            return runPropertiesScanCheck(check, ruleFileName)
        case 'sourceScan':
            return runSourceScanCheck(check, ruleFileName)
        case 'fileExists':
            return runFileExistsCheck(check, ruleFileName)
        case 'printSplashFlow':
            return runPrintSplashFlowCheck(check, ruleFileName)
        case 'permissionAudit':
            return runPermissionAuditCheck(check, ruleFileName)
        default:
            println "⚠️ [${ruleFileName}] 未知检查类型：${type}，已跳过"
            return 0
    }
}

/**
 * 执行指定 .mdc 规则文件中的 gradleChecks。
 */
ext.executeCursorRuleFile = { File mdcFile ->
    def frontmatter = parseMdcFrontmatter(mdcFile)
    if (frontmatter == null) {
        println "⚠️ [${mdcFile.name}] 无 frontmatter，已跳过"
        return 0
    }

    def checksJson = extractGradleChecksJson(frontmatter)
    if (checksJson == null || checksJson.isEmpty()) {
        println "⚠️ [${mdcFile.name}] 未配置 gradleChecks，已跳过"
        return 0
    }

    def checks
    try {
        checks = new JsonSlurper().parseText(checksJson)
    } catch (Exception ignored) {
        println "⚠️ [${mdcFile.name}] gradleChecks JSON 解析失败，已跳过"
        return 0
    }

    if (!(checks instanceof List)) {
        println "⚠️ [${mdcFile.name}] gradleChecks 必须是数组，已跳过"
        return 0
    }

    def warningCount = 0
    checks.each { item ->
        if (item instanceof Map) {
            warningCount += runSingleGradleCheck((Map) item, mdcFile.name)
        }
    }
    return warningCount
}

/**
 * 批量执行 Cursor 规则检查。
 *
 * @param onlyTaskPrefix true=仅 task- 规则（cursorCodeReviewCheck）；false=全部 .mdc
 */
ext.runCursorRuleChecks = { boolean onlyTaskPrefix, String phase ->
    def ruleFiles = collectCursorRuleFiles(onlyTaskPrefix)
    println ''
    println "========== Cursor 规则检查 [${phase}] =========="
    if (ruleFiles.isEmpty()) {
        println '未发现可执行的 .mdc 规则文件'
        println "========== Cursor 规则检查结束 [${phase}] =========="
        println ''
        return
    }

    def totalWarnings = 0
    ruleFiles.each { File mdcFile ->
        println "--- 执行规则：${mdcFile.name} ---"
        if (mdcFile.name == 'task-permission-audit.mdc') {
            cleanupBuildTxtExceptPermissionAudit()
            captureBuildTxtOutput(PERMISSION_AUDIT_BUILD_TXT_NAME, phase) {
                totalWarnings += executeCursorRuleFile(mdcFile)
            }
            println "📝 权限审计报告已写入 ${BUILD_TXT_DIR_RELATIVE}/${PERMISSION_AUDIT_BUILD_TXT_NAME}.txt"
        } else {
            totalWarnings += executeCursorRuleFile(mdcFile)
        }
    }

    if (totalWarnings > 0) {
        println "⚠️ Cursor 规则检查完成：共 ${totalWarnings} 项警告（不阻断构建）"
    } else {
        println '✅ Cursor 规则检查完成：未发现警告'
    }
    println "========== Cursor 规则检查结束 [${phase}] =========="
    println ''
}
